# Mosquitto Configuration cho Fire Alarm System
# Cho phép ESP32 kết nối từ xa trong mạng LAN
listener 1883 0.0.0.0

# Cho phép kết nối ẩn danh (nếu bạn không dùng user/pass trên Mosquitto)
# Tuy nhiên web server và ESP32 đang cấu hình sẵn user/pass.
# Nếu bạn chưa tạo file passwd cho Mosquitto, hãy dùng allow_anonymous true
# và chúng ta sẽ bỏ qua xác thực mật khẩu.
allow_anonymous true

# Nếu bạn muốn bảo mật bằng username/password:
# 1. Chuyển allow_anonymous thành false
# 2. Xóa dấu # ở dòng dưới và trỏ tới file passwd (ví dụ: c:/mosquitto/passwd)
# password_file c:/mosquitto/passwd
