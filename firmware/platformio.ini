; ===================================================================
; HƯỚNG DẪN CHẠY DỰ ÁN (Project Execution Guide)
; Dự án hỗ trợ 2 cách chạy:
; 
; 1. CHẠY MÔ PHỎNG TRÊN WOKWI (Simulator): 
;    - Không cần phần cứng thật. Chỉ cần mở file diagram.json trên trình duyệt hoặc VSCode Wokwi extension.
;    - Các thiết lập mặc định dưới đây đã sẵn sàng cho Wokwi, không cần sửa gì thêm.
; 
; 2. CHẠY TRÊN PHẦN CỨNG THỰC TẾ (Real Hardware):
;    - Gắn cáp USB kết nối ESP32 với máy tính.
;    - Bỏ comment (xóa dấu ;) ở dòng upload_port và monitor_port bên dưới 
;      và thay bằng cổng COM thực tế của bạn (VD: COM5, /dev/ttyUSB0).
;    - Xem thêm hướng dẫn chi tiết tại: docs/REAL_HARDWARE_UPLOAD.md
; ===================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; PlatformIO can usually detect the ESP32 serial port automatically.
; If upload fails because there are multiple ports, uncomment and edit these:
; upload_port = COM5
; monitor_port = COM5
monitor_speed = 115200
upload_speed = 115200
monitor_filters =
    time

lib_deps =
    knolleary/PubSubClient @ ^2.8.0
    bblanchon/ArduinoJson @ ^6.21.3
    adafruit/DHT sensor library @ ^1.4.4
    adafruit/Adafruit Unified Sensor @ ^1.1.9
    madhephaestus/ESP32Servo @ ^1.1.1
